        description: Reitityspalvelut
    welcome:
      title: Tervetuloa!
      introduction: 'Tervetuloa OpenStreetMapiin: ilmaiseen ja vapaasti muokattavaan
        maailmankarttaan. Rekisteröityminen on nyt suoritettu, joten olet valmis aloittamaan
        kartan muokkaamisen. Tutustu ensin kuitenkin näihin perusasioihin.'
      whats_on_the_map:
        title: Kartan sisältö
        on_the_map_html: OpenStreetMap on paikka %{real_and_current} asioiden kartoittamiseen.
          Se sisältää miljoonia rakennuksia, teitä ja muita yksityiskohtia paikoista.
          Voit kartoittaa mitä tahansa tosielämän kohteita, jotka kiinnostavat sinua.
        real_and_current: juuri nyt olemassa olevien
        off_the_map_html: Kartta %{doesnt} sisällä mielipiteitä, kuten arvosteluja,
          historiallisia tai hypoteettisia kohteita, eikä tietoja tekijänoikeuksin
          suojatuista lähteistä. Ellei sinulla ole erityistä lupaa, älä kopioi verkko-
          tai paperikarttoja.
        doesnt: ei
      basic_terms:
        title: Käsitteitä ja termistöä
        paragraph_1: OpenStreetMapissa käytetään paljon vain sille omaista termistöä.
          Kun nämä sanat ovat hallinnassa, olet jo voiton puolella!
        an_editor_html: '%{editor} on ohjelma tai verkkosivu jota voit käyttää kartan
          muokkaamiseen.'
        a_node_html: '%{node} (engl. node) on pistemäinen kohde kartalla, kuten ravintola
          tai puu.'
        a_way_html: '%{way} on viiva tai alue, kuten tie, puro, järvi tai rakennus.'
        a_tag_html: '%{tag} sisältää tietoa pisteestä tai viivasta. Tällaista tietoa
          voi olla vaikkapa ravintolan nimi tai tien nopeusrajoitus.'
        editor: Editori
        node: Piste
        way: viiva
        tag: tunniste
      rules:
        title: Pelisäännöt
        para_1_html: 'OpenStreetMapilla on vain harvoja muodollisia sääntöjä, mutta
          odotamme kaikkien osallistujien tekevän yhteistyötä ja kommunikoivan yhteisön
          kanssa. Jos harkitset muita toimia kuin käsin muokkausta, ole hyvä ja lue
          seuraavat ohjeet: %{imports_link} ja %{automated_edits_link}.'
        imports: Tuonnit
        automated_edits: Automatisoidut muokkaukset
      start_mapping: Aloita kartan muokkaaminen
      continue_authorization: Jatka valtuutusta
    add_a_note:
      title: Eikö muokkaaminen innosta? Ilmoita virheestä karttailmoituksella!
      para_1: Jos huomaat kartalla virheen, muttet halua korjata sitä itse, tee siitä
        karttailmoitus.
      para_2_html: "Klikkaa vain %{note_icon} tai samaa ikonia %{map_link}.\nTämä
        lisää kartalle merkin, jota voit liikuttaa \nraahaamalla. Lisää teksti ja
        klikkaa Tallenna, minkä jälkeen muut kartoittajat voivat tutkia sitä."
      the_map: kartta
    communities:
      title: Yhteisöt
      lede_text: |-
        Ihmiset ympäri maailmaa käyttävät ja täydentävät OpenStreetMapia.
        Vaikka monet osallistuvat yksilöinä, osa käyttäjistä on muodostanut yhteisöjä.
        Näiden ryhmien koko vaihtelee ja ryhmien jäsenet saattavat kattaa joko pienen kylän tai useita alueita eri maista.
        Ryhmät voivat olla muodollisia tai epävirallisia.
      local_chapters:
        title: Paikalliset osastot
        about_text: Paikalliset osastot ovat maa- tai aluetason ryhmiä, jotka ovat
          perustaneet muodollisesti tunnistetun voittoa tavoittelemattoman oikeushenkilön.
          Ne edustavat alueensa karttaa ja kartoittajia paikallishallinnon, yritysten
          ja median suuntaan. Ne ovat sopineet kuuluvansa OpenStreetMap-säätiöön (OSMF),
          mikä antaa niille yhteyden laki- ja tekijänoikeuselimeen.
        list_text: 'Seuraavat yhteisöt on muodollisesti tunnustettu paikallisiksi
          osastoiksi:'
      other_groups:
        title: Muut ryhmät
        other_groups_html: |-
          Ryhmää ei ole tarvetta tunnustaa muodollisesti kuten paikallisosastoja.
          Monet ryhmät toimivat erittäin menestyksekkäästi epävirallisina ihmisten kokoontumisina tai
          yhteisöryhminä. Kuka tahansa voi perustaa näitä tai liittyä niihin. Lue lisää osoitteesta %{communities_wiki_link}.
        communities_wiki: yhteisöjen wiki-sivulla
