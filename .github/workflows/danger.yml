name: Danger

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  statuses: write

jobs:
  danger:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Setup ruby
        uses: ruby/setup-ruby@8e41b362d2589a22a44c1cfa214b3c83052c195b # v1.318.0
        with:
          ruby-version: 3.3
          bundler-cache: true
      - name: Create base branch
        env:
          BASE_CLONE_URL: ${{ github.event.pull_request.base.repo.clone_url }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git fetch "$BASE_CLONE_URL" "$BASE_SHA:danger_base"
      - name: Create head branch
        env:
          HEAD_CLONE_URL: ${{ github.event.pull_request.head.repo.clone_url }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git fetch "$HEAD_CLONE_URL" "$HEAD_SHA:danger_head"
      - name: Danger
        env:
          DANGER_GITHUB_BEARER_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bundle exec danger --verbose
